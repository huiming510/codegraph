# GitLab CI：分支与质量门禁
# - 个人/feature 分支：只跑 Check（backend-check + frontend-check）
# - main / develop / release/* 及 MR 进 main 或 develop：跑 Check + Test
# 详见 docs/GitLab分支与质量门禁.md

stages:
  - check
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

# ---------- 个人分支 + 主分支/发布分支 都跑 Check ----------
backend-check:
  stage: check
  image: python:3.12-slim
  cache:
    key: backend-check
    paths: [.cache/pip]
  before_script:
    - pip install --cache-dir .cache/pip ruff -q
  script:
    - ruff check src/backend
    - ruff format --check src/backend
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  allow_failure: false

frontend-check:
  stage: check
  image: node:20-slim
  cache:
    key: frontend-npm
    paths: [src/frontend/node_modules, .cache/npm]
  before_script:
    - cd src/frontend && npm ci --cache ../.cache/npm --prefer-offline --no-audit
  script:
    - cd src/frontend && npm run check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  allow_failure: false

# ---------- 仅主分支 / 发布分支 / MR 进 main 或 develop 时跑测试 ----------
# 覆盖率：后端 pytest-cov 产出 xml/term；前端 vitest --coverage 产出 json-summary/html。
# 门禁：通过 CI 变量 COVERAGE_BACKEND_MIN / COVERAGE_FRONTEND_MIN 设置（如 60、40），未设置则不强制阈值。
backend-test:
  stage: test
  image: python:3.12-slim
  cache:
    key: backend-test
    paths: [.cache/pip]
  before_script:
    - pip install --cache-dir .cache/pip -r src/backend/requirements.txt -q
    - pip install pytest pytest-asyncio httpx pytest-cov -q
  script:
    - export PYTHONPATH="$CI_PROJECT_DIR/src"
    - |
      if [ -n "${COVERAGE_BACKEND_MIN}" ]; then
        pytest src/backend/tests -v --tb=short --cov=src/backend --cov-report=xml --cov-report=term-missing --cov-fail-under="${COVERAGE_BACKEND_MIN}"
      else
        pytest src/backend/tests -v --tb=short --cov=src/backend --cov-report=xml --cov-report=term-missing
      fi
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)/'
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop")

frontend-test:
  stage: test
  image: node:20-slim
  cache:
    key: frontend-npm
    paths: [src/frontend/node_modules, .cache/npm]
  before_script:
    - cd src/frontend && npm ci --cache ../.cache/npm --prefer-offline --no-audit
  script:
    - cd src/frontend && npm run test:coverage
  artifacts:
    when: always
    paths:
      - src/frontend/coverage/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop")
